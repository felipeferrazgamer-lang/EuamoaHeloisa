<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pra você ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    .container {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    #texto {
      font-size: 22px;
      min-height: 120px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff4d6d;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    img {
      width: 170px;
      border-radius: 15px;
      margin-top: 20px;
      display: none;
      opacity: 0;
      transition: opacity 1s ease;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: subir 6s linear infinite;
    }

    @keyframes subir {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Oi Heloisa ❤️</h1>

    <div id="texto"></div>

    <button id="botao" onclick="iniciar()">Clica aqui 💖</button>

    <img id="foto" src="foto.jpg">
  </div>

  <script>
    const mensagens = [
      "Eu só queria te lembrar de uma coisa...",
      "Eu amo muito você ❤️",
      "Muito mesmo.",
      "Você é uma das melhores coisas que já aconteceu na minha vida.",
      "Seu sorriso me faz feliz de verdade.",
      "Eu penso em você o tempo todo.",
      "E eu só quero te ver bem.",
      "Você é muito especial pra mim 💖",
      "Nunca esquece disso...",
      "Eu te amo Heloisa ❤️"
    ];

    let i = 0;

    function iniciar() {
      document.getElementById("botao").style.display = "none";
      mostrarMensagens();
    }

    function mostrarMensagens() {
      if (i < mensagens.length) {
        document.getElementById("texto").innerHTML = mensagens[i];
        i++;
        setTimeout(mostrarMensagens, 2000);
      } else {
        mostrarFoto();
      }
    }

    function mostrarFoto() {
      const foto = document.getElementById("foto");
      foto.style.display = "block";

      setTimeout(() => {
        foto.style.opacity = "1"; // efeito fade-in
      }, 100);
    }

    // corações animados
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.style.left = Math.random() * 100 + "vw";
      heart.innerHTML = "❤️";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }, 250);
  </script>

</body>
</html>
